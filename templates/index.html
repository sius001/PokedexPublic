<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Snap</title>
    
    <link rel="manifest" href="/static/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF5350">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="icon" type="image/png" href="/static/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    

    
    <style>
        .login-btn {
            background: transparent;
            border: 1px solid var(--rotom-blue);
            color: var(--rotom-blue);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-family: 'Orbitron';
            cursor: pointer;
        }
        .login-btn.logged-in {
            border-color: #4CAF50;
            color: #4CAF50;
        }


        :root {
            --rotom-red: #FF5350; --rotom-blue: #00E5FF; --bg-dark: #121212; --panel-bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --normal: #A8A77A; --fire: #EE8130; --water: #6390F0; --electric: #F7D02C;
            --grass: #7AC74C; --ice: #96D9D6; --fighting: #C22E28; --poison: #A33EA1;
            --ground: #E2BF65; --flying: #A98FF3; --psychic: #F95587; --bug: #A6B91A;
            --rock: #B6A136; --ghost: #735797; --dragon: #6F35FC; --dark: #705746;
            --steel: #B7B7CE; --fairy: #D685AD;
        }

        body { font-family: 'Orbitron', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #1a1a1a; display: flex; justify-content: space-around;
            align-items: center; border-top: 3px solid var(--rotom-red); z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: #666; font-family: 'Orbitron'; cursor: pointer; font-size: 0.7rem; }
        .nav-btn.active { color: var(--rotom-blue); }

        .page { display: none; padding: 15px; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Scanner */
        #scanner-container { width: 100%; max-width: 500px; margin: 0 auto; border: 4px solid var(--rotom-blue); border-radius: 15px; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; display: block; }
        .scan-line { position: absolute; top: 0; width: 100%; height: 4px; background: var(--rotom-blue); box-shadow: 0 0 15px var(--rotom-blue); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .result-panel { background: var(--panel-bg); border-radius: 20px; padding: 15px; margin-top: 15px; border: 2px solid #333; display: none; }
        .image-comparison { display: flex; gap: 8px; margin: 12px 0; }
        .image-box { flex: 1; text-align: center; background: #111; padding: 8px; border-radius: 10px; border: 1px solid #444; }
        .image-box img { width: 100%; height: 110px; object-fit: contain; }
        .missing-photo { filter: grayscale(1) opacity(0.2); }

        /* Buttons */
        .action-btn { display: block; width: 100%; background: var(--rotom-red); color: white; border: none; padding: 12px; border-radius: 30px; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .secondary-btn { background: #333; color: #aaa; font-size: 0.6rem; margin-top: 5px; padding: 8px; width: 100%; border: none; border-radius: 20px; font-family: 'Orbitron'; cursor: pointer;}

        /* Navigation Filters */
        .filter-row { display: flex; gap: 5px; margin: 10px 0; }
        .filter-btn { flex: 1; padding: 10px; font-size: 0.6rem; background: #222; border: 1px solid #444; color: white; font-family: 'Orbitron'; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .filter-btn.active { border-color: var(--rotom-blue); color: var(--rotom-blue); }
        
        #type-trigger-btn { font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); transition: background 0.3s ease; }

        /* Favorite Styles */
        .dex-card { position: relative; transition: transform 0.1s; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .dex-card:active { transform: scale(0.95); }
        .fav-heart { position: absolute; top: 5px; right: 5px; color: #ff4757; font-size: 1.2rem; text-shadow: 0 0 5px rgba(0,0,0,0.5); display: none; z-index: 2; }
        .dex-card.is-fav .fav-heart { display: block; }

        /* Type Grid for Overlay */
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .type-pill { padding: 10px 5px; border-radius: 10px; font-size: 0.55rem; text-transform: uppercase; font-weight: bold; color: white; text-align: center; cursor: pointer; opacity: 0.4; border: 2px solid transparent; }
        .type-pill.active { opacity: 1; border-color: white; }

        /* Collection Grid */
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; margin-top: 15px; }
        .dex-card { background: var(--card-bg); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #3d3d3d; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .dex-card img { width: 100%; height: 70px; object-fit: contain; pointer-events: none; }
        .dex-card.locked img { filter: brightness(0) opacity(0.25); }

        /* Overlays */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; z-index: 2000; flex-direction: column; padding: 20px; box-sizing: border-box; justify-content: center; align-items: center; }
        .modal { background: var(--panel-bg); padding: 20px; border-radius: 20px; border: 2px solid var(--rotom-red); width: 85%; text-align: center; }
        .search-input { width:100%; padding:12px; background:#222; border:1px solid #444; color:white; font-family:'Orbitron'; border-radius: 5px; box-sizing: border-box; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="scanner-page" class="page active">
        <div id="quota-info" style="text-align: center; font-size: 0.7rem; color: var(--rotom-blue); margin-bottom: 10px; display: none;">
            <span id="scans-left">--</span> SCANS LEFT THIS MONTH<br>
            RENEWS ON: <span id="renew-date">--</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 10;">
            <div id="streak-container" style="font-family: 'Orbitron'; font-size: 1rem; display: flex; align-items: center; gap: 5px; text-shadow: 0 0 5px #000;">
                <span id="streak-number">0</span>
                <span id="streak-fire" style="display: none;">🔥</span>
            </div>
            <button id="login-btn" class="login-btn" onclick="handleAuthAction()">LOGIN WITH GOOGLE</button>
        </div>
        <h2 style="text-align: center; color: var(--rotom-red); margin-top: 0; letter-spacing: 2px;">POKÉMON SNAP</h2>
        <div id="scanner-container">
            <video id="video" autoplay playsinline muted></video>
            <div id="scan-line" class="scan-line" style="display:none;"></div>
            
            <div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 0.6rem; color: white;">1x</span>
                <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" style="flex-grow: 1; accent-color: var(--rotom-blue);">
                <span style="font-size: 0.6rem; color: white;">5x</span>
            </div>
        </div>
        <button id="scan-btn" class="action-btn" onclick="captureAndIdentify()">SCAN</button>
        
        <div id="result-panel" class="result-panel">
            <h2 id="res-name" style="text-align:center; margin:0px 0 2px 0;">---</h2>
            <p id="res-meta" style="text-align:center; font-size: 0.65rem; color: var(--rotom-blue); margin: 2px 0 7px 0; letter-spacing: 1px;"></p>
            <div id="res-types" style="text-align:center; margin-bottom: 18px;"></div>

            <div class="image-comparison">
                <div class="image-box"><img id="res-img-user" src=""><label id="res-label-user">CAPTURE</label></div>
                <div class="image-box"><img id="res-img-dex" src=""><label>DATABASE</label></div>
            </div>

            <p id="res-desc" style="font-size: 0.7rem; color: #bbb; text-align: center;"></p>
            <button class="action-btn" onclick="downloadPhoto()">DOWNLOAD PHOTO</button>
            <button class="secondary-btn" onclick="showDeleteConfirm()" style="color: #ff5555;">DELETE ENTRY</button>
            <button class="secondary-btn" onclick="openManualPicker(true)">MANUAL CORRECTION</button>
        </div>
    </div>

    <div id="pokedex-page" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="stats-counter" style="font-size: 0.7rem; color: var(--rotom-blue);">0 / 0</span>
            <div style="display: flex; gap: 5px; align-items: center;">
                <button class="filter-btn" id="sort-btn" onclick="cycleSortMode()" style="width: 100px;">DEX. NO</button>
                <button class="filter-btn" id="dir-btn" onclick="toggleSortDir()" style="width: 15px; min-width: 0; padding: 10px 0;">↓</button>
            </div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="dex-search" class="search-input" placeholder="Search Collection..." onkeyup="renderDex()" style="flex-grow: 1;">
            <button class="filter-btn" onclick="showRandomFromFilter()" style="flex: 0 0 50px; font-size: 1.2rem; padding: 0;">🎲</button>
        </div>
        
        <div class="filter-row">
            <button class="filter-btn active" id="f-all" onclick="setFilter('all')">ALL</button>
            <button class="filter-btn" id="f-caught" onclick="setFilter('caught')">CAUGHT</button>
            <button class="filter-btn" id="f-missing" onclick="setFilter('missing')">MISSING</button>
            
            <button class="filter-btn" id="f-fav" onclick="toggleFavFilter()" style="flex: 0.4; transition: 0.3s; padding: 0;">
                <span id="fav-icon" style="filter: grayscale(1); opacity: 0.5; font-size: 1.2rem; line-height: 1; display: block;">❤️</span>
            </button>
        </div>

        <button class="filter-btn" id="type-trigger-btn" style="width: 100%; margin-top: 5px;" onclick="document.getElementById('type-overlay').style.display='flex'">
            FILTER BY TYPE
        </button>

        <div id="dex-grid" class="dex-grid"></div>

            <div style="padding: 20px 0; text-align: center;">
                <button class="secondary-btn" 
                        style="width: 80%; margin: 0 auto; border: 1px solid var(--rotom-blue); color: var(--rotom-blue); padding: 15px;" 
                        onclick="downloadCollectionJSON()">
                    DOWNLOAD BACKUP JSON
                </button>
            </div>
        </div>
    </div>

    <div id="type-overlay" class="overlay">
        <div class="modal" style="width: 95%; max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-top: 0; color: var(--rotom-blue);">SELECT TYPES</h3>
            <div class="type-grid" id="type-grid-container"></div>
            <button class="action-btn" onclick="document.getElementById('type-overlay').style.display='none'">APPLY</button>
            <button class="secondary-btn" onclick="clearTypeFilters()">CLEAR ALL</button>
        </div>
    </div>

    <div id="picker-overlay" class="overlay" style="justify-content: flex-start;">
        <button class="secondary-btn" onclick="document.getElementById('picker-overlay').style.display='none'" style="margin-bottom: 10px;">BACK</button>
        <input type="text" id="picker-search" class="search-input" placeholder="Search name..." onkeyup="renderPickerList()">
        <div id="picker-list" class="dex-grid" style="width: 100%; overflow-y: scroll;"></div>
    </div>
    
    <div id="confirm-overlay" class="overlay">
        <div class="modal">
            <h3>Delete?</h3>
            <button class="action-btn" onclick="deleteCapturedPhoto()">CONFIRM</button>
            <button class="secondary-btn" onclick="document.getElementById('confirm-overlay').style.display='none'">CANCEL</button>
        </div>
    </div>
    
    <div id="overwrite-overlay" class="overlay">
        <div class="modal">
            <h3 style="margin:0;">CONFLICT</h3>
            <p style="font-size: 0.8rem; margin: 10px 0;">Already have a photo for:</p>
            <div style="background:#111; padding:10px; border-radius:10px; margin-bottom:15px; border: 1px solid #444;">
                <img id="conflict-img" src="" style="width:80px; height:80px; object-fit:contain; display:block; margin: 0 auto;">
                <strong id="conflict-name" style="color:var(--rotom-blue); display:block; margin-top:5px;">---</strong>
            </div>
            <button class="action-btn" onclick="confirmOverwrite(true)">REPLACE PHOTO</button>
            <button class="secondary-btn" onclick="confirmOverwrite(false)">KEEP CURRENT</button>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <button class="secondary-btn" style="color:var(--rotom-red);" onclick="triggerManualFromConflict()">WRONG POKEMON?</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="btn-scan" onclick="showPage('scanner')">SCANNER</button>
        <button class="nav-btn" id="btn-dex" onclick="showPage('pokedex')">COLLECTION</button>
    </nav>

    <canvas id="canvas"></canvas>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWa_IeuSevyKeRG0jv4VEG3O2_tjPxhc4",
            authDomain: "pokemon-snap-1b3c2.firebaseapp.com",
            projectId: "pokemon-snap-1b3c2",
            storageBucket: "pokemon-snap-1b3c2.firebasestorage.app",
            messagingSenderId: "776334935734",
            appId: "1:776334935734:web:d6bd8aa2087408cdf5c817"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let POKEMON_DB = {};
        let currentFilter = 'all';
        let currentSort = 'num'; // Options: 'num', 'abc', 'date'
        let sortAscending = false; // false = Descending (Newest/Highest first), true = Ascending
        let selectedTypes = [];
        let favorites = [];
        let favFilterActive = false; // Tracks if favorite filter is enabled
        let isRendering = false;
        let currentDisplayedPokemon = "";
        let tempPhoto = "";
        let shouldDeleteOnManual = false;
        let videoStream = null;

        // --- NEW: USER STATE & QUOTA CHECK ---
        let userProfile = null;

        auth.onAuthStateChanged(async (user) => {
            const btn = document.getElementById('login-btn');
            const quotaInfo = document.getElementById('quota-info');
            
            if (user) {
                btn.innerText = user.displayName.split(' ')[0].toUpperCase();
                btn.classList.add('logged-in');

                // Fetch User Permissions/Quota from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    // NEW: Prompt for reason on first registration
                    const reason = prompt("Please tell us why you want to use the website:");
                    
                    // Create pending account with the reason included
                    userProfile = {
                        approved: false,
                        unlimitedAccess: false,
                        scanCount: 0,
                        lastResetMonth: new Date().getMonth(),
                        email: user.email,
                        requestReason: reason || "No reason provided" 
                    };
                    await db.collection('users').doc(user.uid).set(userProfile);
                } else {
                    userProfile = userDoc.data();
                }

                // Handle Monthly Reset
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth();

                // Create a date object for the 18th of THIS month
                let resetDateThisMonth = new Date(currentYear, currentMonth, 18);

                // If today is BEFORE the 18th, the "active" reset period started on the 18th of PREVIOUS month
                if (now < resetDateThisMonth) {
                    resetDateThisMonth = new Date(currentYear, currentMonth - 1, 18);
                }

                // If the user's last reset happened BEFORE the start of the current period, reset them
                if (!userProfile.lastResetTime || userProfile.lastResetTime < resetDateThisMonth.getTime()) {
                    userProfile.scanCount = 0;
                    userProfile.lastResetTime = now.getTime(); // Store as timestamp for precision
                    await db.collection('users').doc(user.uid).update({ 
                        scanCount: 0, 
                        lastResetTime: userProfile.lastResetTime 
                    });
                }

                updateQuotaUI();
                quotaInfo.style.display = 'block';
                
            } else {
                btn.innerText = "LOGIN WITH GOOGLE";
                btn.classList.remove('logged-in');
                quotaInfo.style.display = 'none';
                userProfile = null;
            }
            renderDex();
        });

        function updateQuotaUI() {
            if (!userProfile) return;
            
            const quotaInfo = document.getElementById('quota-info');

            if (!userProfile.approved) {
                quotaInfo.innerHTML = `
                    <div style="color: var(--rotom-red); font-weight: bold; letter-spacing: 1px;">
                        ACCOUNT PENDING APPROVAL<br>
                        SCAN FEATURE DISABLED SORRY :(
                    </div>
                `;
            } else {
                // Flex container to put button on the right
                // Container uses flex-start to snap text to the left, button remains absolute right
                quotaInfo.innerHTML = `
                    <div style="display: flex; justify-content: flex-start; align-items: center; position: relative;">
                        <div id="quota-text-container" style="text-align: left;">
                            <span id="scans-left">--</span> SCANS LEFT THIS MONTH<br>
                            RENEWS ON: <span id="renew-date">--</span>
                        </div>
                        <button onclick="sendFeedback()" style="position: absolute; right: 0; background: var(--rotom-blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; cursor: pointer;">
                            FEEDBACK
                        </button>
                    </div>
                `;
                
                const scansLeft = userProfile.unlimitedAccess ? "∞" : Math.max(0, 25 - userProfile.scanCount);
                document.getElementById('scans-left').innerText = scansLeft;
                
                const now = new Date();
                let nextRenew = new Date(now.getFullYear(), now.getMonth(), 18);
                if (now >= nextRenew) {
                    nextRenew.setMonth(nextRenew.getMonth() + 1);
                }
                document.getElementById('renew-date').innerText = nextRenew.toLocaleDateString();
            }
        }

        async function sendFeedback() {
            const message = prompt("Enter your feedback or report a bug:");
            if (!message) return;

            try {
                await db.collection('feedback').add({
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    message: message,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Feedback sent! Thank you.");
            } catch (e) {
                console.error("Feedback error:", e);
                alert("Failed to send feedback. Please try again later.");
            }
        }


        async function updateStreak() {
            const today = new Date().toDateString();
            const streakData = await localforage.getItem('user_streak') || { count: 0, lastDate: "" };
            
            const lastDate = streakData.lastDate;
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            if (lastDate === today) {
                // Already scanned today
                document.getElementById('streak-fire').style.display = 'inline';
            } else if (lastDate === yesterday.toDateString()) {
                // Haven't scanned today, but did yesterday (streak continues but no fire yet)
                document.getElementById('streak-fire').style.display = 'none';
            } else {
                // Streak broken
                streakData.count = 0;
                document.getElementById('streak-fire').style.display = 'none';
            }

            document.getElementById('streak-number').innerText = streakData.count;
            return streakData;
        }

        // Call this inside your masterSave function after a successful scan
        async function incrementStreak() {
            const today = new Date().toDateString();
            let streakData = await localforage.getItem('user_streak') || { count: 0, lastDate: "" };

            if (streakData.lastDate !== today) {
                streakData.count += 1;
                streakData.lastDate = today;
                await localforage.setItem('user_streak', streakData);
            }
            updateStreak();
        }

        async function showRandomFromFilter() {
            // 1. Get all currently visible cards in the grid
            const visibleCards = document.querySelectorAll('#dex-grid .dex-card');
            if (visibleCards.length === 0) return;

            // 2. Pick a random index
            const randomIndex = Math.floor(Math.random() * visibleCards.length);
            const selectedCard = visibleCards[randomIndex];

            // 3. Trigger the click event to open the info panel
            selectedCard.click();
        }

        // --- DUAL STORAGE LOGIC ---
        async function masterSave(pokemonName, photo, dataObj) {
            // 1. Prepare the standard object format
            const captureData = {
                image: photo,
                date: Date.now(),
                number: dataObj.number,
                category: dataObj.category,
                types: dataObj.types,
                description: dataObj.description
            };

            // 2. Save to Local Device (Always)
            await localforage.setItem(pokemonName, captureData);
            console.log("Saved locally.");
            await incrementStreak();

            // 3. Save to Google Cloud (If Logged In)
            const user = auth.currentUser;
            if (user) {
                try {
                    await db.collection('users')
                            .doc(user.uid)
                            .collection('pokedex')
                            .doc(pokemonName)
                            .set(captureData);
                    console.log("Synced to Cloud.");
                } catch (e) {
                    console.error("Cloud Sync Error:", e);
                }
            }
        }

        // Watch for login/logout
        auth.onAuthStateChanged(async (user) => {
            const btn = document.getElementById('login-btn');
            if (user) {
                btn.innerText = user.displayName.split(' ')[0].toUpperCase();
                btn.classList.add('logged-in');

                // NEW: Background Sync - Download missing cloud data to local storage
                try {
                    const snapshot = await db.collection('users').doc(user.uid).collection('pokedex').get();
                    snapshot.forEach(async (doc) => {
                        const name = doc.id;
                        const cloudData = doc.data();
                        
                        // Check if we already have this locally
                        const localData = await localforage.getItem(name);
                        if (!localData || (localData.date < cloudData.date)) {
                            // Save to localforage so the icon appears immediately
                            await localforage.setItem(name, cloudData);
                            console.log(`Synced ${name} from cloud.`);
                        }
                    });
                    // Re-render once after the initial batch sync starts
                    setTimeout(renderDex, 1000); 
                } catch (e) {
                    console.error("Background sync error:", e);
                }
            } else {
                btn.innerText = "LOGIN WITH GOOGLE";
                btn.classList.remove('logged-in');
            }
            renderDex();
        });

        async function handleAuthAction() {
            const user = auth.currentUser;
            if (user) {
                // If already logged in, show sign out confirmation
                if (confirm("Sign out? Your data is safe in the cloud and on this device.")) {
                    await auth.signOut();
                    location.reload();
                }
            } else {
                // THIS IS THE PART THAT WAS MISSING:
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    // This opens the Google Login Popup
                    const result = await auth.signInWithPopup(provider);
                    
                    // Once they log in, sync their existing local data to their new account
                    console.log("Login successful! Syncing data...");
                    await syncLocalToCloud(result.user.uid);
                    
                    // Refresh the display
                    renderDex();
                    alert(`Welcome, ${result.user.displayName}! Cloud sync is active.`);
                } catch (e) { 
                    console.error("Login Error:", e);
                    alert("Login failed. Check if popups are blocked.");
                }
            }
        }

        async function syncLocalToCloud(uid) {
            const keys = await localforage.keys();
            for (let key of keys) {
                if (key === 'user_favorites') continue;
                const data = await localforage.getItem(key);
                // Upload each caught Pokemon to your specific user folder in the cloud
                await db.collection('users').doc(uid).collection('pokedex').doc(key).set(data);
            }
        }

        

        const TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];

        async function migrateOldData() {
            const keys = await localforage.keys();
            for (let key of keys) {
                if (key === 'user_favorites') continue;
                const data = await localforage.getItem(key);
                // Only migrate if the data is a string (the old format)
                if (typeof data === 'string' && data.startsWith('data:image')) {
                    await localforage.setItem(key, {
                        image: data,
                        date: 1712361600000 // Sets date to April 6, 2026
                    });
                }
            }
        }

        async function init() {
            try {
                // 1. START CAMERA FIRST (Removed 'await' so it runs in the background)
                startCamera();

                // 2. Load the database in the background
                const res = await fetch('/api/all_pokemon');
                POKEMON_DB = await res.json();
                
                // 3. Run migration and favorites
                await migrateOldData();
                const savedFavs = await localforage.getItem('user_favorites');
                if (savedFavs) favorites = savedFavs;

                generateTypeGrid();
            } catch (e) { 
                console.error("Initialization Error:", e);
            }
            updateStreak();
        }

        async function startCamera() {
            try {
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
                
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                
                const videoElement = document.getElementById('video');
                videoElement.srcObject = videoStream;
                
                // EXPLICITLY play the video immediately 
                videoElement.play().catch(e => console.warn("Auto-play blocked:", e));

                const track = videoStream.getVideoTracks()[0];
                
                // CRITICAL FIX: Safely check if getCapabilities exists before calling it
                if (typeof track.getCapabilities === 'function') {
                    const capabilities = track.getCapabilities();
                    const zoomSlider = document.getElementById('zoom-slider');

                    if (capabilities && capabilities.zoom) {
                        zoomSlider.min = capabilities.zoom.min;
                        zoomSlider.max = capabilities.zoom.max;
                        zoomSlider.step = capabilities.zoom.step;
                        zoomSlider.value = capabilities.zoom.min;
                        
                        const newSlider = zoomSlider.cloneNode(true);
                        zoomSlider.parentNode.replaceChild(newSlider, zoomSlider);
                        newSlider.addEventListener('input', async (e) => {
                            await track.applyConstraints({ advanced: [{ zoom: parseFloat(e.target.value) }] });
                        });
                    } else {
                        // Hide slider if zoom is not supported
                        document.getElementById('zoom-slider').parentElement.style.display = 'none';
                    }
                } else {
                    // Hide slider if capabilities API is missing
                    document.getElementById('zoom-slider').parentElement.style.display = 'none';
                }
            } catch (err) {
                console.error("Camera Error:", err);
            }
        }

        async function toggleFavorite(name, cardElement) {
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            const index = favorites.indexOf(name);
            if (index > -1) {
                favorites.splice(index, 1);
                cardElement.classList.remove('is-fav');
                // Hide immediately if filtering by favorites
                if (favFilterActive) cardElement.style.display = 'none';
            } else {
                favorites.push(name);
                cardElement.classList.add('is-fav');
            }
            
            await localforage.setItem('user_favorites', favorites);
        }

        async function captureAndIdentify() {
            // 1. Check if Logged In
            if (!auth.currentUser) {
                alert("Please login to scan Pokémon.");
                return;
            }

            // 2. Check Approval
            if (!userProfile.approved) {
                alert("Access Pending. Please wait for admin approval.");
                return;
            }

            // 3. Check Quota
            if (!userProfile.unlimitedAccess && userProfile.scanCount >= 25) {
                alert("Monthly scan limit reached!");
                return;
            }

            const btn = document.getElementById('scan-btn');
            btn.disabled = true; btn.innerText = "PROCESSING...";
            document.getElementById('scan-line').style.display = "block";
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1280; 
            canvas.height = (video.videoHeight / video.videoWidth) * 1280;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            tempPhoto = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const res = await fetch('/upload', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ image: tempPhoto }) // Now it matches app.py
                });
                const data = await res.json();
                
                if (res.ok) {
                    // Increment Scan Count in Database
                    const newCount = (userProfile.scanCount || 0) + 1;
                    await db.collection('users').doc(auth.currentUser.uid).update({ scanCount: newCount });
                    userProfile.scanCount = newCount;
                    updateQuotaUI();
                    
                    await checkAndSave(data.name, tempPhoto, POKEMON_DB[data.name]);
                } else {
                    alert("Could not identify target.");
                }
            } catch (e) { 
                console.error("Upload Error:", e); 
            } finally {
                btn.disabled = false; btn.innerText = "SCAN";
                document.getElementById('scan-line').style.display = "none";
            }
        }

        async function checkAndSave(name, photo, dataObj) {
            currentDisplayedPokemon = name;
            const existing = await localforage.getItem(name);
            
            if (existing) {
                document.getElementById('conflict-name').innerText = name;
                document.getElementById('conflict-img').src = `/static/Full Pokemon/${name}.png`;
                document.getElementById('overwrite-overlay').style.display = 'flex';
            } else {
                // Use the new masterSave function
                await masterSave(name, photo, dataObj);
                displayResult(name, photo, dataObj);
            }
        }

        async function confirmOverwrite(overwrite) {
            document.getElementById('overwrite-overlay').style.display = 'none';
            const dataObj = POKEMON_DB[currentDisplayedPokemon];
            
            if (overwrite) {
                // Update both local and cloud with the new photo
                await masterSave(currentDisplayedPokemon, tempPhoto, dataObj);
            }
            
            const finalData = await localforage.getItem(currentDisplayedPokemon);
            
            // CRITICAL: Update tempPhoto so the download button works with the displayed image
            tempPhoto = finalData.image; 
            await incrementStreak();
            
            displayResult(currentDisplayedPokemon, finalData.image, dataObj);
        }

        async function displayResult(name, userImg, data) {
            if (!data) return;
            currentDisplayedPokemon = name;

            let stored = await localforage.getItem(name);
            // ... (keep your existing cloud check logic here) ...

            // CRITICAL: Set tempPhoto so the download button works for this specific pokemon
            if (userImg) {
                tempPhoto = userImg;
            } else if (stored && stored.image) {
                tempPhoto = stored.image;
            } else {
                tempPhoto = ""; // Reset if not caught
            }
            
            const user = auth.currentUser;
            
            if (!stored && user) {
                const doc = await db.collection('users').doc(user.uid).collection('pokedex').doc(name).get();
                if (doc.exists) {
                    stored = doc.data();
                    // Optional: Save it locally now so it's faster next time
                    await localforage.setItem(name, stored);
                }
            }

            const dateStr = stored ? new Date(stored.date).toLocaleDateString() : "NOT CAUGHT";
            const currentImg = userImg || (stored ? stored.image : null);

            document.getElementById('result-panel').style.display = 'block';

            // 1. SET THE NAME
            document.getElementById('res-name').innerText = name;

            // 2. NEW: SET NUMBER AND CATEGORY

            document.getElementById('res-meta').innerText = `${data.number} ${data.category}`;

            // 3. SET THE TYPES
            const container = document.getElementById('res-types');
            container.innerHTML = '';
            data.types.forEach(t => {
                const span = document.createElement('span');
                span.className = 'type-pill active';
                span.style.backgroundColor = `var(--${t.toLowerCase()})`;

                    Captured: ${dateStr}

        async function renderDex() {
            if (isRendering) return;
            isRendering = true;
            const grid = document.getElementById('dex-grid');
            const search = document.getElementById('dex-search').value.toLowerCase();
            grid.innerHTML = '';
            
            let items = Object.entries(POKEMON_DB);

            // 1. Gather data from BOTH local and cloud
            const localKeys = await localforage.keys();
            const caughtSet = new Set(localKeys.filter(k => k !== 'user_favorites'));
            
            const user = auth.currentUser;
            if (user) {
                const snapshot = await db.collection('users').doc(user.uid).collection('pokedex').get();
                snapshot.forEach(doc => caughtSet.add(doc.id));
            }

            const itemData = await Promise.all(Object.entries(POKEMON_DB).map(async ([name, info]) => {
                const isCaught = caughtSet.has(name);
                let stored = null;
                
                if (isCaught) {
                    stored = await localforage.getItem(name);
                    
                    // IF NOT LOCAL: Try to show a placeholder or 
                    // trigger a render once the background sync (above) finishes.
                    if (!stored && user) {
                        // While the background sync is working, show the silhouette 
                        // so the user knows it IS caught, just loading.
                        stored = { date: Date.now(), image: null }; 
                    }
                }

                return { 
                    name, info, 
                    // Ensure we use the stored image if available
                    userImg: (stored && stored.image) ? stored.image : null, 
                    date: stored ? stored.date : 0,
                    isCaught: isCaught 
                };
            }));

            // 2. Sort Logic
            itemData.sort((a, b) => {
                // Always prioritize caught on "DATE" sort
                if (currentSort === 'date') {
                    if (a.isCaught && !b.isCaught) return -1;
                    if (!a.isCaught && b.isCaught) return 1;
                }

                let comparison = 0;
                if (currentSort === 'num') {
                    // ↓ = 1 to 1025 (Smallest to Largest)
                    comparison = parseInt(a.info.number.replace('#', '')) - parseInt(b.info.number.replace('#', ''));
                } else if (currentSort === 'abc') {
                    // ↓ = A to Z
                    comparison = a.name.localeCompare(b.name);
                } else if (currentSort === 'date') {
                    // ↓ = Newest (High Timestamp) to Oldest (Low Timestamp)
                    // We flip this specifically so ↓ puts recent photos at the top
                    comparison = b.date - a.date;
                }

                // If ↓ (sortAscending is false), keep the comparison as is.
                // If ↑ (sortAscending is true), flip the result.
                return sortAscending ? -comparison : comparison;
            });

            const fragment = document.createDocumentFragment();
            let caught = 0; let visible = 0;

            for (const item of itemData) {
                const { name, info, userImg, isCaught } = item;
                const isFav = favorites.includes(name);
                if (isCaught) caught++;

                // Filters
                if (search && !name.toLowerCase().includes(search)) continue;
                if (currentFilter === 'caught' && !isCaught) continue;
                if (currentFilter === 'missing' && isCaught) continue;
                if (favFilterActive && !isFav) continue; 
                if (selectedTypes.length > 0 && !selectedTypes.every(t => info.types.includes(t))) continue;

                visible++;
                const card = document.createElement('div');
                card.className = `dex-card ${isCaught ? '' : 'locked'} ${isFav ? 'is-fav' : ''}`;
                // ... Rest of your card creation code (long press, innerHTML, etc) ...
                card.innerHTML = `
                    <span class="fav-heart">❤️</span>
                    <img src="${isCaught ? userImg : '/static/Full Pokemon/'+name+'.png'}" loading="lazy">
                    <p style="font-size:0.5rem; margin:2px;">#${info.number}</p>
                    <strong>${isCaught ? name : '???' }</strong>
                `;
                
                // --- SCROLL-AWARE LONG PRESS (1 SECOND) ---
                let pressTimer;
                let startX, startY;

                const startPress = (e) => {
                    // Record starting position (handle both touch and mouse)
                    const touch = e.touches ? e.touches[0] : e;
                    startX = touch.pageX;
                    startY = touch.pageY;

                    // Set timer for 1 second (1000ms)
                    pressTimer = window.setTimeout(() => {
                        toggleFavorite(name, card);
                        pressTimer = null; // Mark as triggered
                    }, 1000);
                };

                const movePress = (e) => {
                    if (!pressTimer) return;
                    const touch = e.touches ? e.touches[0] : e;
                    
                    // If finger moves more than 10px, it's a scroll, not a long press
                    if (Math.abs(touch.pageX - startX) > 10 || Math.abs(touch.pageY - startY) > 10) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                };

                const endPress = () => {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                };

                card.onmousedown = card.ontouchstart = startPress;
                card.onmousemove = card.ontouchmove = movePress; // Track movement
                card.onmouseup = card.onmouseleave = card.ontouchend = endPress;
                
                card.oncontextmenu = (e) => {
                    e.preventDefault();
                    return false;
                };

                card.onclick = (e) => {
                    // Only open scanner if we didn't just finish a long-press
                    showPage('scanner'); 
                    displayResult(name, userImg, info); 
                };
                fragment.appendChild(card);
            }
            document.getElementById('stats-counter').innerText = `${caught} / ${items.length} (Visible: ${visible})`;
            grid.appendChild(fragment);
            isRendering = false;
        }

        function generateTypeGrid() {
            const container = document.getElementById('type-grid-container');
            container.innerHTML = '';
            TYPES.forEach(t => {
                const p = document.createElement('div');
                p.className = 'type-pill' + (selectedTypes.includes(t) ? ' active' : '');
                p.style.backgroundColor = `var(--${t.toLowerCase()})`;
                p.innerText = t; p.id = `pill-${t}`;
                p.onclick = () => toggleTypeFilter(t);
                container.appendChild(p);
            });
        }

        function toggleTypeFilter(type) {
            const el = document.getElementById(`pill-${type}`);
            if (selectedTypes.includes(type)) {
                selectedTypes = selectedTypes.filter(t => t !== type);
                el.classList.remove('active');
            } else if (selectedTypes.length < 2) {
                selectedTypes.push(type);
                el.classList.add('active');
            }
            updateTypeButtonColor();
            renderDex();
        }

        function updateTypeButtonColor() {
            const btn = document.getElementById('type-trigger-btn');
            if (selectedTypes.length === 0) {
                btn.style.background = "#222"; btn.innerText = "FILTER BY TYPE";
            } else if (selectedTypes.length === 1) {
                const c = getComputedStyle(document.documentElement).getPropertyValue(`--${selectedTypes[0].toLowerCase()}`);
                btn.style.background = c; btn.innerText = `TYPE: ${selectedTypes[0].toUpperCase()}`;
            } else {
                const c1 = getComputedStyle(document.documentElement).getPropertyValue(`--${selectedTypes[0].toLowerCase()}`);
                const c2 = getComputedStyle(document.documentElement).getPropertyValue(`--${selectedTypes[1].toLowerCase()}`);
                btn.style.background = `linear-gradient(90deg, ${c1} 50%, ${c2} 50%)`;
                btn.innerText = `${selectedTypes[0].toUpperCase()} / ${selectedTypes[1].toUpperCase()}`;
            }
        }

        function clearTypeFilters() {
            selectedTypes = [];
            document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
            updateTypeButtonColor();
            renderDex();
        }

            document.getElementById('f-' + f).classList.add('active');

        function cycleSortMode() {
            const modes = ['num', 'abc', 'date'];
            let idx = (modes.indexOf(currentSort) + 1) % modes.length;
            currentSort = modes[idx];
            
            // Logic: If mode is 'num', show 'DEX. NO', if 'abc' show 'ABC', otherwise 'DATE'
            const label = currentSort === 'num' ? 'DEX. NO' : (currentSort === 'abc' ? 'NAME' : 'DATE');
            
            document.getElementById('sort-btn').innerText = label;
            renderDex();
        }

        function toggleSortDir() {
            sortAscending = !sortAscending;
            // false = ↓ (Standard/Recent), true = ↑ (Reverse/Oldest)
            document.getElementById('dir-btn').innerText = sortAscending ? '↑' : '↓';
            renderDex();

        function downloadPhoto() {
            // 1. Determine if tempPhoto is a string or an object
            let imageData = tempPhoto;
            if (tempPhoto && typeof tempPhoto === 'object') {
                imageData = tempPhoto.image;
            }

            if (!imageData || !imageData.startsWith('data:image')) {
                alert("No capture found to download!");
                return;
            }

            const link = document.createElement('a');
            link.download = `${currentDisplayedPokemon}_Capture.jpg`;
            
            // Convert the base64 to a Blob
            const byteString = atob(imageData.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            
            const blob = new Blob([ab], {type: 'image/jpeg'});
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        }

        async function downloadCollectionJSON() {
            const keys = await localforage.keys();
            const collectionData = {};

            for (let key of keys) {
                // Skip the favorites list, we just want the Pokemon entries
                if (key === 'user_favorites') continue;
                
                const entry = await localforage.getItem(key);
                collectionData[key] = entry;
            }

            // Create the JSON blob
            const dataStr = JSON.stringify(collectionData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            
            // Create a temporary link to trigger the download
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            
            const timestamp = new Date().toISOString().split('T')[0];
            link.download = `pokedex_backup_${timestamp}.json`;
            link.href = url;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Force the camera to wake up if the window regains focus or is tapped
        window.addEventListener('focus', () => {
            const video = document.getElementById('video');
            if (video && video.paused && videoStream) {
                video.play().catch(e => console.warn(e));
            }
        });
        
        document.body.addEventListener('click', () => {
            const video = document.getElementById('video');
            if (video && video.paused && videoStream) {
                video.play().catch(e => console.warn(e));
            }
        });

        init();
